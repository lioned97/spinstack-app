<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SpinStack</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b0f14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SpinStack" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!--
      Tailwind Play CDN: makes Tailwind utility classes work with ZERO build setup.
      SpinStack was authored as a single-file component that styles itself with
      Tailwind classes, so this is what makes it render correctly. The console will
      log a "cdn.tailwindcss.com should not be used in production" note — harmless
      for a personal app. If you ever want it gone, swap to a real Tailwind build.
    -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
